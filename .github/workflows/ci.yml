name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Check Nix formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Check formatting
        run: |
          find home-manager -name '*.nix' -not -path '*/result*' \
            | xargs nix run nixpkgs#nixpkgs-fmt -- --check

  parse:
    name: Parse-check Nix files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Parse all .nix files
        # Catches syntax errors that the formatter does not.
        # Full flake evaluation is blocked in CI by private SSH inputs
        # (tidal-overlay, tidal-tools); see README for details.
        run: |
          find home-manager -name '*.nix' -not -path '*/result*' \
            | xargs -I{} nix-instantiate --parse {} > /dev/null

  windows:
    name: Windows Bootstrap
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup environment
        shell: pwsh
        run: |
          # Create a symlink so the script finds the dotfiles at ~/dotfiles
          # GitHub Actions runners have Developer Mode enabled, so this works without elevation.
          New-Item -ItemType SymbolicLink -Path "$HOME\dotfiles" -Target $env:GITHUB_WORKSPACE


      - name: Run bootstrap (Dry Run)
        shell: pwsh
        run: |
          .\windows\bootstrap.ps1 --dry-run

      - name: Run bootstrap (Wet Run - Symlinks only)
        shell: pwsh
        run: |
          # We run the wet run to verify symlink creation.
          # We skip the heavy winget/scoop installs in CI if they are already there
          # or if they are too slow, but bootstrap.nu will check if apps are installed.
          .\windows\bootstrap.ps1


      - name: Verify Symlinks
        shell: pwsh
        run: |
          $links = @(
            "$HOME\.gitconfig",
            "$HOME\.wezterm.lua",
            "$env:APPDATA\nushell\config.nu"
          )
          foreach ($link in $links) {
            if (-not (Test-Path $link)) {
              Write-Error "Missing symlink: $link"
              exit 1
            }
            $item = Get-Item $link
            if (-not $item.Attributes.HasFlag([System.IO.FileAttributes]::ReparsePoint)) {
              Write-Error "Not a symlink: $link"
              exit 1
            }
            Write-Host "Verified: $link"
          }

