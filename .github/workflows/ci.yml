name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Check Nix formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Check formatting
        run: |
          find home-manager -name '*.nix' -not -path '*/result*' \
            | xargs nix run nixpkgs#nixpkgs-fmt -- --check

  parse:
    name: Parse-check Nix files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Parse all .nix files
        # Catches syntax errors that the formatter does not.
        # Full flake evaluation is blocked in CI by private SSH inputs
        # (tidal-overlay, tidal-tools); see README for details.
        run: |
          find home-manager -name '*.nix' -not -path '*/result*' \
            | xargs -I{} nix-instantiate --parse {} > /dev/null

  windows:
    name: Windows Bootstrap
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup environment
        shell: pwsh
        run: |
          # Create a symlink so the script finds the dotfiles at ~/dotfiles
          # GitHub Actions runners have Developer Mode enabled, so this works without elevation.
          New-Item -ItemType SymbolicLink -Path "$HOME\dotfiles" -Target $env:GITHUB_WORKSPACE


      - name: Validate DSC configuration
        shell: pwsh
        run: |
          winget configure validate --file windows\setup.winget --accept-configuration-agreements

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -Repository PSGallery
          # Error-only for now: style/Warning-level rules haven't been applied
          # retroactively to the existing scripts, so start with correctness bugs.
          $results = Get-ChildItem -Path windows -Filter *.ps1 -Recurse `
            | Invoke-ScriptAnalyzer -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) error-severity issue(s)."
            exit 1
          }
          Write-Host "No PSScriptAnalyzer errors found."

      - name: Run bootstrap (symlinks only)
        shell: pwsh
        run: |
          # CI only exercises symlink creation, not the full winget/scoop package
          # install (too slow, and not the thing this job is meant to guard).
          .\windows\bootstrap.ps1 -SymlinksOnly

      - name: Verify Symlinks
        shell: pwsh
        run: |
          . .\windows\links.ps1
          $issues = Test-DotfilesLinks -Detailed
          if ($issues.Count -gt 0) {
            $issues | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "All symlinks verified."

